<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>7Tour - Crie sua conta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unica+One&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Roboto+Flex:opsz,wght@8..144,300;8..144,400;8..144,500;8..144,700;8..144,900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/cadastro.css" />
</head>

<body>
  <section class="left-frame">
    <div class="container">
      <p class="new-agency"><a href="index.html">Voltar ao Inicio</a></p>
      <h1 class="create-account">Crie sua <span>conta</span></h1>

      <div class="field">
        <label for="agency-name">Nome da Agência</label>
        <input type="text" id="input_agency" placeholder="Agência exemplo turismo" />
      </div>

      <div class="two-fields">
        <div class="field">
          <label for="cnpj">CNPJ</label>
          <input type="text" id="input_cnpj" placeholder="00.000.000/0001-01" maxlength="18" />
        </div>
        <div class="field">
          <label for="whatsapp">Telefone para contato</label>
          <input type="tel" id="input_whatsapp" placeholder="(11) 99999-9999" maxlength="15" />
        </div>
      </div>

      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="input_email" placeholder="contato@agencias.com.br" />
        <span class="field-error" id="email-error"></span>
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="input_password" placeholder="Mínimo de 8 caracteres" />
        <span class="field-error" id="password-error"></span>
      </div>

      <button class="create-button" type="button" id="create-button" onclick="register()">
        Criar conta
      </button>

      <p class="redirection-login">Já tem conta? <a href="login.html">Entrar</a></p>
    </div>
  </section>

  <section class="right-frame">
    <p class="logo">new [way].</p>
    <ul class="features">
      <li class="topic">
        <div class="check-icon">
          <img width="16" height="16" src="./assets/check-mark.png" alt="check" />
        </div>
        <p class="topic-text">
          <strong>Perfil do viajante - </strong>entenda cada cliente antes de
          propor um pacote.
        </p>
      </li>
      <li class="topic">
        <div class="check-icon">
          <img width="16" height="16" src="./assets/check-mark.png" alt="check" />
        </div>
        <p class="topic-text">
          <strong>Sugestões inteligentes - </strong>pacotes sob medida para
          cada perfil.
        </p>
      </li>
      <li class="topic">
        <div class="check-icon">
          <img width="16" height="16" src="./assets/check-mark.png" alt="check" />
        </div>
        <p class="topic-text">
          <strong>Dashboard de gestão - </strong>controle completo do seu
          negócio.
        </p>
      </li>
    </ul>
  </section>
  
  <script src="./js/cadastro.js"></script>
</body>
</html>
